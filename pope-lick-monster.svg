<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Pope Lick Monster: Dragon × Yeti hybrid map icon -->

  <!-- Dragon horns -->
  <path d="M15,9 Q12,4 14,1 Q16,5 17,8Z" fill="#7a3b1e" stroke="#4a1f0a" stroke-width="0.5"/>
  <path d="M25,9 Q28,4 26,1 Q24,5 23,8Z" fill="#7a3b1e" stroke="#4a1f0a" stroke-width="0.5"/>

  <!-- Yeti fur wisps around head sides -->
  <path d="M12,14 L10,11 L12,12 L10,9 L13,11 L11,8 L14,11" fill="#3d6b28"/>
  <path d="M28,14 L30,11 L28,12 L30,9 L27,11 L29,8 L26,11" fill="#3d6b28"/>

  <!-- Head -->
  <ellipse cx="20" cy="12" rx="8" ry="7" fill="#3d6b28" stroke="#2a4d1b" stroke-width="0.5"/>

  <!-- Brow ridge (dragon) -->
  <path d="M13,10 Q16,8 20,9 Q24,8 27,10" stroke="#2a4d1b" stroke-width="1" fill="none"/>

  <!-- Eyes: glowing red -->
  <ellipse cx="16.5" cy="10.5" rx="2.5" ry="2" fill="#cc1100"/>
  <ellipse cx="23.5" cy="10.5" rx="2.5" ry="2" fill="#cc1100"/>
  <ellipse cx="16.5" cy="10.5" rx="1.2" ry="1" fill="#ff7700" opacity="0.85"/>
  <ellipse cx="23.5" cy="10.5" rx="1.2" ry="1" fill="#ff7700" opacity="0.85"/>

  <!-- Dragon snout / muzzle -->
  <path d="M15,14 Q20,18 25,14 L24,16 Q20,20 16,16Z" fill="#2d5a1f" stroke="#1e3d16" stroke-width="0.5"/>

  <!-- Fangs -->
  <line x1="17" y1="15" x2="17" y2="17.5" stroke="#e8dfc0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="16" x2="20" y2="18.5" stroke="#e8dfc0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="15" x2="23" y2="17.5" stroke="#e8dfc0" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Nostrils -->
  <ellipse cx="18.5" cy="15" rx="0.8" ry="0.6" fill="#1e3d16"/>
  <ellipse cx="21.5" cy="15" rx="0.8" ry="0.6" fill="#1e3d16"/>

  <!-- Body (broad-shouldered, yeti bulk) -->
  <path d="M10,30 Q9,23 11,19 Q15,17 20,17 Q25,17 29,19 Q31,23 30,30 Q26,34 20,34 Q14,34 10,30Z"
        fill="#3d6b28" stroke="#2a4d1b" stroke-width="0.5"/>

  <!-- Dragon scale chevrons on chest -->
  <path d="M16,21 Q18,19 20,21 Q22,19 24,21" stroke="#2a4d1b" stroke-width="0.8" fill="none"/>
  <path d="M15,24 Q17,22 19,24 Q21,22 23,24 Q25,22 27,24" stroke="#2a4d1b" stroke-width="0.8" fill="none"/>
  <path d="M16,27 Q18,25 20,27 Q22,25 24,27" stroke="#2a4d1b" stroke-width="0.8" fill="none"/>

  <!-- Yeti shoulder fur (jagged strokes) -->
  <path d="M11,20 L9,18 L11,19 L9,17 L12,18" stroke="#2a4d1b" stroke-width="0.8" fill="none"/>
  <path d="M29,20 L31,18 L29,19 L31,17 L28,18" stroke="#2a4d1b" stroke-width="0.8" fill="none"/>

  <!-- Left arm -->
  <path d="M11,22 Q6,21 5,25 Q7,28 9,26 Q10,24 11,24" fill="#3d6b28" stroke="#2a4d1b" stroke-width="0.5"/>
  <!-- Left claws -->
  <line x1="5" y1="25" x2="3" y2="23" stroke="#1e3d16" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="5" y1="25" x2="3" y2="25.5" stroke="#1e3d16" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="5" y1="25" x2="4" y2="27.5" stroke="#1e3d16" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Right arm -->
  <path d="M29,22 Q34,21 35,25 Q33,28 31,26 Q30,24 29,24" fill="#3d6b28" stroke="#2a4d1b" stroke-width="0.5"/>
  <!-- Right claws -->
  <line x1="35" y1="25" x2="37" y2="23" stroke="#1e3d16" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="35" y1="25" x2="37" y2="25.5" stroke="#1e3d16" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="35" y1="25" x2="36" y2="27.5" stroke="#1e3d16" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Left leg -->
  <path d="M14,32 L13,38 Q15,39.5 17,38.5 L17,32" fill="#3d6b28" stroke="#2a4d1b" stroke-width="0.5"/>
  <!-- Left foot claws -->
  <line x1="13.5" y1="38" x2="11.5" y2="39.5" stroke="#1e3d16" stroke-width="1" stroke-linecap="round"/>
  <line x1="15" y1="39" x2="14.5" y2="41" stroke="#1e3d16" stroke-width="1" stroke-linecap="round"/>

  <!-- Right leg -->
  <path d="M23,32 L23,38.5 Q25,39.5 27,38 L27,32" fill="#3d6b28" stroke="#2a4d1b" stroke-width="0.5"/>
  <!-- Right foot claws -->
  <line x1="26.5" y1="38" x2="28.5" y2="39.5" stroke="#1e3d16" stroke-width="1" stroke-linecap="round"/>
  <line x1="25" y1="39" x2="25.5" y2="41" stroke="#1e3d16" stroke-width="1" stroke-linecap="round"/>

  <!-- Dragon tail (curls to bottom-right) -->
  <path d="M27,31 Q33,34 35,39" fill="none" stroke="#3d6b28" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow/barb tail tip -->
  <path d="M34,38 L39,40 L35,40.5 L36,38Z" fill="#7a3b1e" stroke="#4a1f0a" stroke-width="0.4"/>

  <!-- Dorsal ridge nubs at top of back (dragon feature) -->
  <path d="M17.5,17 L16,14.5 L19,17" fill="#2d5a1f"/>
  <path d="M22.5,17 L24,14.5 L21,17" fill="#2d5a1f"/>
</svg>

<!-- Created pope-lick-monster.svg in the final-proposal/ folder. Here's what the icon includes:

Dragon features:

Two curved brown horns at the top
Scaly chevron pattern on the chest
Dragon snout with three fangs
Glowing red/orange eyes with slit pupils
Dorsal ridge nubs on the upper back
A curling tail with a brown barbed tip
Yeti features:

Broad, barrel-chested body silhouette
Jagged fur wisps framing the head and shoulders
Heavy arms with three-claw hands
Thick legs with two-claw feet
Color palette: Forest green (#3d6b28) body, dark green 
(#2a4d1b) outlines/scales, 
warm brown (#7a3b1e) horns and tail tip, 
crimson/orange glowing eyes — 
fitting for a menacing cryptid marker on a Kentucky legends map. 
-->
